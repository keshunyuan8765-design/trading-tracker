<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trading Tracker</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
  :root {
    --bg:#0a0a0a; --surface:#141414; --surface2:#1e1e1e;
    --border:#2a2a2a; --border2:#333;
    --text:#e8e8e8; --muted:#666; --muted2:#888;
    --green:#00d084; --green-dim:rgba(0,208,132,0.12);
    --red:#ff4d4d; --red-dim:rgba(255,77,77,0.12);
    --blue:#4d9fff; --blue-dim:rgba(77,159,255,0.12);
    --yellow:#f0c040;
    --mono:'IBM Plex Mono',monospace;
    --sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;overscroll-behavior:none}

  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;gap:1.5rem}
  .login-logo{font-family:var(--mono);font-size:12px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
  .login-title{font-family:var(--mono);font-size:28px;font-weight:400;color:var(--text);text-align:center;line-height:1.3}
  .login-title span{color:var(--green)}
  .login-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.7;max-width:280px}
  .login-accounts{display:flex;gap:10px;margin-top:4px}
  .acct-pill{padding:4px 14px;border-radius:99px;font-family:var(--mono);font-size:11px;letter-spacing:.06em}
  .pill-yf{background:var(--green-dim);color:var(--green);border:0.5px solid var(--green)}
  .pill-ty{background:var(--blue-dim);color:var(--blue);border:0.5px solid var(--blue)}

  #app{display:none;flex-direction:column;min-height:100vh}
  #app.visible{display:flex}

  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
  .header-logo{font-family:var(--mono);font-size:13px;letter-spacing:.15em;color:var(--green)}
  .header-user{font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--mono)}

  .tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:45px;z-index:99}
  .tab{flex:1;padding:11px 4px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-align:center;color:var(--muted);cursor:pointer;border-bottom:1.5px solid transparent;transition:color .15s,border-color .15s;text-transform:uppercase}
  .tab.active{color:var(--green);border-bottom-color:var(--green)}

  .page{display:none;padding:14px;padding-bottom:40px}
  .page.active{display:block}

  .sync-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--surface);border-radius:6px;margin-bottom:12px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
  .sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}.sync-dot.loading{background:#f0c040;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .combined-card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .combined-title{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  .combined-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border)}
  .combined-row:last-child{border-bottom:none}
  .combined-name{font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:7px}
  .combined-vals{text-align:right}
  .combined-eq{font-family:var(--mono);font-size:14px;font-weight:500}
  .combined-chg{font-family:var(--mono);font-size:11px;margin-top:2px}

  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .card-title{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:13px}

  .acct-section{border:0.5px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
  .acct-header{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--surface2);border-bottom:0.5px solid var(--border)}
  .acct-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .acct-dot-yf{background:var(--green)}.acct-dot-ty{background:var(--blue)}
  .acct-label{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--muted2);text-transform:uppercase}
  .acct-body{padding:12px 13px;background:var(--surface)}

  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono);margin-bottom:5px}
  .field input,.field select{width:100%;padding:9px 12px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:15px;outline:none;transition:border-color .15s}
  .field input:focus,.field select:focus{border-color:var(--green)}
  .field select option{background:var(--surface2)}

  .btn-primary{width:100%;padding:11px;background:var(--green);color:#000;border:none;border-radius:6px;font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.08em;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:4px}
  .btn-primary:active{transform:scale(0.98);opacity:.9}
  .btn-primary:disabled{opacity:.35;cursor:not-allowed}
  .btn-ghost{padding:5px 11px;background:transparent;border:0.5px solid var(--border2);border-radius:6px;color:var(--muted2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:border-color .15s,color .15s}
  .btn-ghost:hover{border-color:var(--green);color:var(--green)}

  .metrics-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
  .metric{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:11px 13px}
  .metric-label{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;font-family:var(--mono)}
  .metric-value{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text)}
  .metric-value.pos{color:var(--green)}.metric-value.neg{color:var(--red)}
  .metric-sub{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono)}

  .chart-toggle{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .ctbtn{padding:4px 11px;font-family:var(--mono);font-size:11px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.04em}
  .ctbtn.on-yf{border-color:var(--green);color:var(--green);background:var(--green-dim)}
  .ctbtn.on-ty{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
  .ctbtn.on-both{border-color:var(--yellow);color:var(--yellow);background:rgba(240,192,64,0.1)}

  .period-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
  .pbtn{padding:4px 9px;font-family:var(--mono);font-size:11px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
  .pbtn.active{background:var(--green);color:#000;border-color:var(--green)}

  .chart-wrap{position:relative;width:100%;height:200px;margin-top:8px}
  .chart-wrap-sm{position:relative;width:100%;height:130px;margin-top:8px}
  .chart-wrap-md{position:relative;width:100%;height:180px;margin-top:8px}

  .record{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border)}
  .record:last-child{border-bottom:none}
  .record-left{flex:1;min-width:0}
  .record-date{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .record-note{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
  .record-right{text-align:right;flex-shrink:0;margin-left:10px}
  .record-val{font-family:var(--mono);font-size:14px;font-weight:500}
  .record-chg{font-family:var(--mono);font-size:11px;margin-top:2px}

  .badge{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500}
  .badge-yf{background:var(--green-dim);color:var(--green)}
  .badge-ty{background:var(--blue-dim);color:var(--blue)}
  .badge-in{background:var(--green-dim);color:var(--green)}
  .badge-out{background:var(--red-dim);color:var(--red)}

  .section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}

  /* Monthly table */
  .month-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border)}
  .month-row:last-child{border-bottom:none}
  .month-label{font-family:var(--mono);font-size:12px;color:var(--muted);min-width:50px}
  .month-eq{font-family:var(--mono);font-size:13px;font-weight:500;text-align:right}
  .month-chg{font-family:var(--mono);font-size:11px;text-align:right;min-width:70px}

  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);padding:8px 18px;border-radius:99px;font-family:var(--mono);font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999}
  #toast.show{opacity:1}
  .empty{text-align:center;padding:2rem 1rem;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.06em}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">台指期 · Algo Trading</div>
  <div class="login-title">TRADING<br><span>TRACKER</span></div>
  <div class="login-accounts">
    <span class="acct-pill pill-yf">永豐</span>
    <span class="acct-pill pill-ty">統一</span>
  </div>
  <div class="login-sub">記錄每日帳戶權益，同步至 Google Sheets，分析績效曲線與回撤。</div>
  <div id="g-signin-btn" style="margin-top:8px"></div>
</div>

<div id="app">
  <div class="header">
    <div class="header-logo">TRACKER</div>
    <div class="header-user" id="user-info" onclick="signOut()">登出</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('today')">今日</div>
    <div class="tab" onclick="switchTab('chart')">圖表</div>
    <div class="tab" onclick="switchTab('monthly')">月報</div>
    <div class="tab" onclick="switchTab('history')">紀錄</div>
    <div class="tab" onclick="switchTab('cashflow')">出入金</div>
  </div>

  <!-- TODAY -->
  <div class="page active" id="page-today">
    <div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">尚未同步</span></div>
    <div class="combined-card" id="combined-summary"></div>
    <div class="card">
      <div class="card-title">記錄今日權益</div>
      <div class="field"><label>日期</label><input type="date" id="eq-date"></div>
      <div class="acct-section">
        <div class="acct-header"><div class="acct-dot acct-dot-yf"></div><div class="acct-label">永豐</div></div>
        <div class="acct-body">
          <div class="field" style="margin-bottom:8px"><label>帳戶權益（元）</label><input type="number" id="yf-val" placeholder="1,250,000" step="1"></div>
          <div class="field" style="margin-bottom:0"><label>備註（選填）</label><input type="text" id="yf-note" placeholder="例如 持多單 3口"></div>
        </div>
      </div>
      <div class="acct-section" style="margin-bottom:12px">
        <div class="acct-header"><div class="acct-dot acct-dot-ty"></div><div class="acct-label">統一</div></div>
        <div class="acct-body">
          <div class="field" style="margin-bottom:8px"><label>帳戶權益（元）</label><input type="number" id="ty-val" placeholder="800,000" step="1"></div>
          <div class="field" style="margin-bottom:0"><label>備註（選填）</label><input type="text" id="ty-note" placeholder="例如 空單避險"></div>
        </div>
      </div>
      <button class="btn-primary" id="save-btn" onclick="saveEquity()">同步至 Google Sheets</button>
    </div>
  </div>

  <!-- CHART -->
  <div class="page" id="page-chart">
    <div class="card">
      <div class="section-row" style="margin-bottom:8px">
        <div class="card-title" style="margin:0">權益曲線</div>
      </div>
      <div class="period-row">
        <button class="pbtn active" onclick="setPeriod('1m',this)">1M</button>
        <button class="pbtn" onclick="setPeriod('3m',this)">3M</button>
        <button class="pbtn" onclick="setPeriod('1y',this)">1Y</button>
        <button class="pbtn" onclick="setPeriod('ytd',this)">今年</button>
        <button class="pbtn" onclick="setPeriod('all',this)">全部</button>
      </div>
      <div class="chart-toggle">
        <button class="ctbtn on-yf" id="ct-yf" onclick="setChartMode('yf')">永豐</button>
        <button class="ctbtn" id="ct-ty" onclick="setChartMode('ty')">統一</button>
        <button class="ctbtn" id="ct-both" onclick="setChartMode('both')">合併對比</button>
      </div>
      <div class="chart-wrap"><canvas id="eqChart" role="img" aria-label="帳戶權益歷史折線圖">權益歷史圖表</canvas></div>
    </div>
    <div class="metrics-grid" id="chart-metrics"></div>
    <div class="card">
      <div class="card-title">最大回撤 MDD</div>
      <div class="chart-wrap-sm"><canvas id="mddChart" role="img" aria-label="最大回撤圖">MDD圖</canvas></div>
    </div>
  </div>

  <!-- MONTHLY -->
  <div class="page" id="page-monthly">
    <div class="card">
      <div class="section-row" style="margin-bottom:10px">
        <div class="card-title" style="margin:0">月度損益</div>
        <div class="chart-toggle" style="margin:0">
          <button class="ctbtn on-yf" id="mt-yf" onclick="setMonthTab('yf')">永豐</button>
          <button class="ctbtn" id="mt-ty" onclick="setMonthTab('ty')">統一</button>
        </div>
      </div>
      <div class="chart-wrap-md"><canvas id="monthChart" role="img" aria-label="每月損益長條圖">月度損益圖</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">月度明細</div>
      <div id="month-table"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="page" id="page-history">
    <div class="card">
      <div class="section-row">
        <div class="card-title" style="margin:0">歷史紀錄</div>
        <button class="btn-ghost" onclick="loadFromSheets()">重新同步</button>
      </div>
      <div class="chart-toggle" style="margin-bottom:12px">
        <button class="ctbtn on-yf" id="ht-yf" onclick="setHistTab('yf')">永豐</button>
        <button class="ctbtn" id="ht-ty" onclick="setHistTab('ty')">統一</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- CASHFLOW -->
  <div class="page" id="page-cashflow">
    <div class="card">
      <div class="card-title">新增出入金</div>
      <div class="field"><label>日期</label><input type="date" id="cf-date"></div>
      <div class="field"><label>帳戶</label>
        <select id="cf-acct"><option value="yf">永豐</option><option value="ty">統一</option></select>
      </div>
      <div class="field"><label>類型</label>
        <select id="cf-type"><option value="in">入金</option><option value="out">出金</option></select>
      </div>
      <div class="field"><label>金額（元）</label><input type="number" id="cf-val" placeholder="100000" step="1"></div>
      <div class="field"><label>備註（選填）</label><input type="text" id="cf-note" placeholder="匯款"></div>
      <button class="btn-primary" onclick="saveCashflow()">儲存至 Google Sheets</button>
    </div>
    <div class="card">
      <div class="section-row">
        <div class="card-title" style="margin:0">出入金紀錄</div>
        <button class="btn-ghost" onclick="loadCashflowFromSheets()">重新同步</button>
      </div>
      <div id="cf-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const CLIENT_ID = '222670680688-ebr0gacivb399cgfmobshs180cr8h3hr.apps.googleusercontent.com';
const SPREADSHEET_ID = '1vJz4OxFcVhJHXJtVNvVe0dnQ6na1ybuJa-ZC8W0rb4M';
const EQ_SHEET = 'Equity';
const CF_SHEET = 'Cashflow';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
const TOKEN_KEY = 'tt_access_token';
const TOKEN_EXP_KEY = 'tt_token_exp';

let accessToken = null;
let eqData = { yf:[], ty:[] };
let cfData = [];
let eqChart = null, mddChart = null, monthChart = null;
let currentPeriod = '1m';
let chartMode = 'yf';
let histTab = 'yf';
let monthTab = 'yf';

// ── TOKEN ─────────────────────────────────────────────
function saveToken(t){ localStorage.setItem(TOKEN_KEY,t); localStorage.setItem(TOKEN_EXP_KEY,(Date.now()+55*60*1000).toString()); }
function loadToken(){ const t=localStorage.getItem(TOKEN_KEY),e=parseInt(localStorage.getItem(TOKEN_EXP_KEY)||'0'); return (t&&Date.now()<e)?t:null; }
function clearToken(){ localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXP_KEY); }
function scheduleRefresh(){
  const e=parseInt(localStorage.getItem(TOKEN_EXP_KEY)||'0');
  const ms=e-Date.now()-5*60*1000;
  if(ms>0) setTimeout(()=>window._tokenClient.requestAccessToken({prompt:''}),ms);
}

// ── AUTH ──────────────────────────────────────────────
function initGSI(){
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:handleCredential});
  google.accounts.id.renderButton(document.getElementById('g-signin-btn'),{theme:'filled_black',size:'large',text:'signin_with',shape:'pill',width:260});
  window._tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:(resp)=>{
      if(resp.access_token){
        accessToken=resp.access_token;
        saveToken(accessToken); scheduleRefresh();
        showApp();
        initSheets().then(()=>{ loadFromSheets(); loadCashflowFromSheets(); });
      }
    }
  });
  const saved=loadToken();
  if(saved){ accessToken=saved; scheduleRefresh(); showApp(); initSheets().then(()=>{ loadFromSheets(); loadCashflowFromSheets(); }); }
  else google.accounts.id.prompt(()=>{});
}
function handleCredential(){ window._tokenClient.requestAccessToken({prompt:'consent'}); }
function signOut(){ google.accounts.id.disableAutoSelect(); clearToken(); accessToken=null; document.getElementById('app').classList.remove('visible'); document.getElementById('login-screen').style.display='flex'; toast('已登出'); }
function showApp(){ document.getElementById('login-screen').style.display='none'; document.getElementById('app').classList.add('visible'); setTodayDates(); setSyncStatus('ok','已連線'); }
window.addEventListener('load',()=>{ if(typeof google!=='undefined'&&google.accounts)initGSI(); else document.querySelector('script[src*="gsi"]').addEventListener('load',initGSI); });

// ── API ───────────────────────────────────────────────
async function api(method,path,body){
  const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}${path}`,{
    method,headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
    body:body?JSON.stringify(body):undefined
  });
  if(res.status===401){ clearToken(); toast('登入已過期，請重新登入'); setTimeout(()=>{ document.getElementById('app').classList.remove('visible'); document.getElementById('login-screen').style.display='flex'; },1500); throw new Error('401'); }
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

async function initSheets(){
  try{
    const meta=await api('GET','?fields=sheets.properties.title');
    const titles=meta.sheets.map(s=>s.properties.title);
    if(!titles.includes(EQ_SHEET)){ await api('POST',':batchUpdate',{requests:[{addSheet:{properties:{title:EQ_SHEET}}}]}); await api('PUT',`/values/${EQ_SHEET}!A1:E1?valueInputOption=RAW`,{values:[['Date','YF_Equity','YF_Note','TY_Equity','TY_Note']]}); }
    if(!titles.includes(CF_SHEET)){ await api('POST',':batchUpdate',{requests:[{addSheet:{properties:{title:CF_SHEET}}}]}); await api('PUT',`/values/${CF_SHEET}!A1:E1?valueInputOption=RAW`,{values:[['Date','Account','Type','Amount','Note']]}); }
  }catch(e){ if(e.message!=='401')toast('Sheet 初始化失敗'); }
}

// ── LOAD ──────────────────────────────────────────────
const parseVal=v=>parseFloat((v||'').toString().replace(/,/g,''))||0;

async function loadFromSheets(){
  setSyncStatus('loading','同步中...');
  try{
    const res=await api('GET',`/values/${EQ_SHEET}!A2:E2000`);
    const rows=res.values||[];
    eqData.yf=rows.map(r=>({date:r[0]||'',val:parseVal(r[1]),note:r[2]||''})).filter(r=>r.date&&r.val).sort((a,b)=>a.date.localeCompare(b.date));
    eqData.ty=rows.map(r=>({date:r[0]||'',val:parseVal(r[3]),note:r[4]||''})).filter(r=>r.date&&r.val).sort((a,b)=>a.date.localeCompare(b.date));
    setSyncStatus('ok','已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
    renderCombinedSummary(); renderHistory();
    if(document.getElementById('page-chart').classList.contains('active'))renderCharts();
    if(document.getElementById('page-monthly').classList.contains('active'))renderMonthly();
  }catch(e){ if(e.message!=='401'){setSyncStatus('err','同步失敗');toast('讀取失敗');} }
}

async function saveEquity(){
  const date=document.getElementById('eq-date').value;
  const yfVal=document.getElementById('yf-val').value;
  const tyVal=document.getElementById('ty-val').value;
  if(!date||(!yfVal&&!tyVal)){toast('請填入日期與至少一個帳戶的權益');return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='儲存中...'; setSyncStatus('loading','儲存中...');
  try{
    const existing=await api('GET',`/values/${EQ_SHEET}!A2:A2000`);
    const rows=existing.values||[];
    const rowIdx=rows.findIndex(r=>r[0]===date);
    const rowData=[date,yfVal||'',document.getElementById('yf-note').value.trim(),tyVal||'',document.getElementById('ty-note').value.trim()];
    if(rowIdx>=0){ const n=rowIdx+2; await api('PUT',`/values/${EQ_SHEET}!A${n}:E${n}?valueInputOption=RAW`,{values:[rowData]}); toast('已更新 '+date); }
    else{ await api('POST',`/values/${EQ_SHEET}!A1:E1:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{values:[rowData]}); toast('已儲存 '+date); }
    ['yf-val','ty-val','yf-note','ty-note'].forEach(id=>document.getElementById(id).value='');
    await loadFromSheets();
  }catch(e){ if(e.message!=='401'){setSyncStatus('err','儲存失敗');toast('儲存失敗');} }
  btn.disabled=false; btn.textContent='同步至 Google Sheets';
}

async function loadCashflowFromSheets(){
  try{
    const res=await api('GET',`/values/${CF_SHEET}!A2:E2000`);
    cfData=(res.values||[]).map(r=>({date:r[0]||'',acct:r[1]||'yf',type:r[2]||'in',val:parseVal(r[3]),note:r[4]||''})).filter(r=>r.date&&r.val).sort((a,b)=>b.date.localeCompare(a.date));
    renderCashflow();
  }catch(e){}
}
async function saveCashflow(){
  const date=document.getElementById('cf-date').value;
  const acct=document.getElementById('cf-acct').value;
  const type=document.getElementById('cf-type').value;
  const val=parseFloat(document.getElementById('cf-val').value);
  const note=document.getElementById('cf-note').value.trim();
  if(!date||isNaN(val)){toast('請填入日期與金額');return;}
  try{
    await api('POST',`/values/${CF_SHEET}!A1:E1:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{values:[[date,acct,type,val,note]]});
    document.getElementById('cf-val').value=''; document.getElementById('cf-note').value='';
    toast('已儲存'); await loadCashflowFromSheets();
  }catch(e){ if(e.message!=='401')toast('儲存失敗'); }
}

// ── UTILS ─────────────────────────────────────────────
function fmtTWD(n){ if(!n)return'NT$0'; if(n>=1e6)return'NT$'+(n/1e4).toFixed(0)+'萬'; if(n>=1e4)return'NT$'+(n/1e4).toFixed(1)+'萬'; return'NT$'+Math.round(n).toLocaleString(); }
function fmtPct(n){ return(n>=0?'+':'')+n.toFixed(2)+'%'; }
function calcMDD(vals){ let peak=vals[0]||0,mdd=0; for(const v of vals){if(v>peak)peak=v;const dd=(peak-v)/peak;if(dd>mdd)mdd=dd;} return mdd; }

function filterPeriod(arr){
  if(currentPeriod==='all')return arr;
  let cutoff=new Date();
  if(currentPeriod==='1m') cutoff.setMonth(cutoff.getMonth()-1);
  else if(currentPeriod==='3m') cutoff.setMonth(cutoff.getMonth()-3);
  else if(currentPeriod==='1y') cutoff.setFullYear(cutoff.getFullYear()-1);
  else if(currentPeriod==='ytd') cutoff=new Date(new Date().getFullYear(),0,1);
  const c=cutoff.toISOString().slice(0,10);
  return arr.filter(e=>e.date>=c);
}

// Monthly aggregation: last record of each month
function getMonthlyData(arr){
  const map={};
  for(const e of arr){
    const ym=e.date.slice(0,7); // "2026-01"
    map[ym]=e.val; // overwrite → last record of month wins
  }
  const months=Object.keys(map).sort();
  return months.map((ym,i)=>{
    const val=map[ym];
    const prevYm=months[i-1];
    const prevVal=prevYm?map[prevYm]:null;
    const chg=prevVal!==null?((val-prevVal)/Math.abs(prevVal)*100):null;
    return{ym,val,chg};
  });
}

// ── RENDER ────────────────────────────────────────────
function renderCombinedSummary(){
  const el=document.getElementById('combined-summary');
  const row=(key,label,color)=>{
    const d=eqData[key];
    if(!d.length)return`<div class="combined-row"><div class="combined-name"><span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>${label}</div><div class="combined-vals"><div class="combined-eq" style="color:var(--muted)">無資料</div></div></div>`;
    const latest=d[d.length-1],prev=d.length>1?d[d.length-2]:null;
    const chg=prev?((latest.val-prev.val)/Math.abs(prev.val)*100):null;
    return`<div class="combined-row"><div class="combined-name"><span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>${label}</div>
      <div class="combined-vals"><div class="combined-eq">${fmtTWD(latest.val)}</div>${chg!==null?`<div class="combined-chg" style="color:${chg>=0?'var(--green)':'var(--red)'}">${fmtPct(chg)}</div>`:''}</div></div>`;
  };
  const total=(eqData.yf.length?eqData.yf[eqData.yf.length-1].val:0)+(eqData.ty.length?eqData.ty[eqData.ty.length-1].val:0);
  el.innerHTML=`<div class="combined-title">帳戶總覽 · ${new Date().toLocaleDateString('zh-TW')}</div>
    ${row('yf','永豐','var(--green)')}${row('ty','統一','var(--blue)')}
    <div class="combined-row"><div class="combined-name" style="font-weight:500;color:var(--text)">合計</div>
    <div class="combined-vals"><div class="combined-eq" style="color:var(--yellow);font-size:16px">${fmtTWD(total)}</div></div></div>`;
}

function renderCharts(){
  const gc='rgba(255,255,255,0.05)',tc='#555',mf='IBM Plex Mono';
  const yfF=filterPeriod(eqData.yf),tyF=filterPeriod(eqData.ty);
  let labels,datasets;
  if(chartMode==='both'){
    const allDates=[...new Set([...yfF.map(e=>e.date),...tyF.map(e=>e.date)])].sort();
    labels=allDates.map(d=>d.slice(5));
    const ym=Object.fromEntries(yfF.map(e=>[e.date,e.val]));
    const tm=Object.fromEntries(tyF.map(e=>[e.date,e.val]));
    datasets=[
      {label:'永豐',data:allDates.map(d=>ym[d]??null),borderColor:'#00d084',backgroundColor:'rgba(0,208,132,0.08)',borderWidth:1.5,pointRadius:0,tension:0.3,fill:false,spanGaps:true},
      {label:'統一',data:allDates.map(d=>tm[d]??null),borderColor:'#4d9fff',backgroundColor:'rgba(77,159,255,0.08)',borderWidth:1.5,pointRadius:0,tension:0.3,fill:false,spanGaps:true}
    ];
  }else{
    const d=chartMode==='yf'?yfF:tyF,color=chartMode==='yf'?'#00d084':'#4d9fff';
    labels=d.map(e=>e.date.slice(5));
    datasets=[{label:chartMode==='yf'?'永豐':'統一',data:d.map(e=>e.val),borderColor:color,backgroundColor:color==='#00d084'?'rgba(0,208,132,0.15)':'rgba(77,159,255,0.15)',borderWidth:1.5,pointRadius:d.length>60?0:2,tension:0.3,fill:true}];
  }
  if(eqChart)eqChart.destroy();
  eqChart=new Chart(document.getElementById('eqChart').getContext('2d'),{
    type:'line',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:chartMode==='both',labels:{color:'#888',font:{family:mf,size:11},boxWidth:10,padding:12}}},
      scales:{x:{ticks:{color:tc,maxTicksLimit:6,maxRotation:0,font:{family:mf,size:10}},grid:{color:gc}},
              y:{ticks:{color:tc,callback:v=>v>=10000?(v/10000).toFixed(0)+'萬':v,font:{family:mf,size:10}},grid:{color:gc}}}}
  });

  const mddSrc=chartMode==='ty'?tyF:yfF,mddColor=chartMode==='ty'?'rgba(77,159,255,0.8)':'rgba(255,77,77,0.8)';
  let peak=mddSrc[0]?.val||0;
  const dds=mddSrc.map(e=>{ if(e.val>peak)peak=e.val; return peak>0?-((peak-e.val)/peak*100):0; });
  if(mddChart)mddChart.destroy();
  mddChart=new Chart(document.getElementById('mddChart').getContext('2d'),{
    type:'line',
    data:{labels:mddSrc.map(e=>e.date.slice(5)),datasets:[{data:dds,borderColor:mddColor,backgroundColor:mddColor.replace('0.8','0.15'),borderWidth:1.5,pointRadius:0,fill:true,tension:0.2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:tc,maxTicksLimit:5,maxRotation:0,font:{family:mf,size:10}},grid:{color:gc}},
              y:{ticks:{color:tc,callback:v=>v.toFixed(1)+'%',font:{family:mf,size:10}},grid:{color:gc}}}}
  });

  const cm=document.getElementById('chart-metrics');
  const block=(d,label,color)=>{
    if(!d.length)return'';
    const vals=d.map(e=>e.val),ret=vals.length>1?((vals[vals.length-1]-vals[0])/Math.abs(vals[0])*100):0,mdd=calcMDD(vals);
    return`<div class="metric"><div class="metric-label" style="color:${color}">${label} 報酬</div><div class="metric-value ${ret>=0?'pos':'neg'}">${fmtPct(ret)}</div></div>
           <div class="metric"><div class="metric-label" style="color:${color}">${label} MDD</div><div class="metric-value neg">-${(mdd*100).toFixed(2)}%</div></div>`;
  };
  if(chartMode==='both'){ cm.innerHTML=block(yfF,'永豐','var(--green)')+block(tyF,'統一','var(--blue)'); }
  else{
    const d=chartMode==='yf'?yfF:tyF,label=chartMode==='yf'?'永豐':'統一',color=chartMode==='yf'?'var(--green)':'var(--blue)';
    cm.innerHTML=block(d,label,color)+`<div class="metric"><div class="metric-label">最高權益</div><div class="metric-value">${d.length?fmtTWD(Math.max(...d.map(e=>e.val))):'-'}</div></div>
      <div class="metric"><div class="metric-label">資料筆數</div><div class="metric-value">${d.length}</div></div>`;
  }
}

function renderMonthly(){
  const tc='#555',mf='IBM Plex Mono',gc='rgba(255,255,255,0.05)';
  const d=eqData[monthTab];
  const months=getMonthlyData(d);
  if(!months.length){ document.getElementById('month-table').innerHTML='<div class="empty">尚無資料</div>'; return; }

  const labels=months.map(m=>m.ym.slice(5)+'月');
  const chgData=months.map(m=>m.chg!==null?parseFloat(m.chg.toFixed(2)):0);
  const colors=chgData.map(v=>v>=0?'rgba(0,208,132,0.8)':'rgba(255,77,77,0.8)');

  if(monthChart)monthChart.destroy();
  monthChart=new Chart(document.getElementById('monthChart').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[{data:chgData,backgroundColor:colors,borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:tc,font:{family:mf,size:10},maxRotation:0},grid:{color:gc}},
              y:{ticks:{color:tc,callback:v=>v.toFixed(1)+'%',font:{family:mf,size:10}},grid:{color:gc}}}}
  });

  const el=document.getElementById('month-table');
  el.innerHTML=[...months].reverse().map(m=>`
    <div class="month-row">
      <div class="month-label">${m.ym.replace('-','/')}</div>
      <div class="month-eq">${fmtTWD(m.val)}</div>
      <div class="month-chg" style="color:${m.chg===null?'var(--muted)':m.chg>=0?'var(--green)':'var(--red)'}">
        ${m.chg!==null?fmtPct(m.chg):'-'}
      </div>
    </div>`).join('');
}

function renderHistory(){
  const el=document.getElementById('history-list');
  const list=[...eqData[histTab]].reverse();
  if(!list.length){el.innerHTML='<div class="empty">尚無資料</div>';return;}
  el.innerHTML=list.map((e,i)=>{
    const prev=list[i+1],chg=prev?((e.val-prev.val)/Math.abs(prev.val)*100):null;
    return`<div class="record"><div class="record-left"><div class="record-date">${e.date}</div>${e.note?`<div class="record-note">${e.note}</div>`:''}</div>
      <div class="record-right"><div class="record-val">${fmtTWD(e.val)}</div>${chg!==null?`<div class="record-chg" style="color:${chg>=0?'var(--green)':'var(--red)'}">${fmtPct(chg)}</div>`:''}</div></div>`;
  }).join('');
}

function renderCashflow(){
  const el=document.getElementById('cf-list');
  if(!cfData.length){el.innerHTML='<div class="empty">尚無出入金紀錄</div>';return;}
  el.innerHTML=cfData.map(c=>`<div class="record">
    <div class="record-left">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
        <span class="badge ${c.acct==='yf'?'badge-yf':'badge-ty'}">${c.acct==='yf'?'永豐':'統一'}</span>
        <span class="badge ${c.type==='in'?'badge-in':'badge-out'}">${c.type==='in'?'入金':'出金'}</span>
        <span class="record-date">${c.date}</span>
      </div>${c.note?`<div class="record-note">${c.note}</div>`:''}
    </div>
    <div class="record-right"><div class="record-val" style="color:${c.type==='in'?'var(--green)':'var(--red)'}">${c.type==='in'?'+':'-'}${fmtTWD(c.val)}</div></div>
  </div>`).join('');
}

// ── UI ────────────────────────────────────────────────
function switchTab(name){
  const tabs=['today','chart','monthly','history','cashflow'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===name));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+name));
  if(name==='chart')renderCharts();
  if(name==='monthly')renderMonthly();
  if(name==='history')renderHistory();
  if(name==='cashflow')renderCashflow();
}
function setPeriod(p,btn){ currentPeriod=p; document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCharts(); }
function setChartMode(mode){ chartMode=mode; document.getElementById('ct-yf').className='ctbtn'+(mode==='yf'?' on-yf':''); document.getElementById('ct-ty').className='ctbtn'+(mode==='ty'?' on-ty':''); document.getElementById('ct-both').className='ctbtn'+(mode==='both'?' on-both':''); renderCharts(); }
function setHistTab(tab){ histTab=tab; document.getElementById('ht-yf').className='ctbtn'+(tab==='yf'?' on-yf':''); document.getElementById('ht-ty').className='ctbtn'+(tab==='ty'?' on-ty':''); renderHistory(); }
function setMonthTab(tab){ monthTab=tab; document.getElementById('mt-yf').className='ctbtn'+(tab==='yf'?' on-yf':''); document.getElementById('mt-ty').className='ctbtn'+(tab==='ty'?' on-ty':''); renderMonthly(); }
function setSyncStatus(state,text){ document.getElementById('sync-dot').className='sync-dot '+state; document.getElementById('sync-text').textContent=text; }
function setTodayDates(){ const t=new Date().toISOString().slice(0,10); document.getElementById('eq-date').value=t; document.getElementById('cf-date').value=t; }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }
</script>
